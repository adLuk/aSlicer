# Common ports for any printer or service
common.ports=22,80,443,3344,8080

# List of profiles to load
profiles=bambulab,prusa,klipper,octoprint

# Bambu Lab configuration
profile.bambulab.name=Bambu Lab
# Minimal set that uniquely identifies Bambu Lab: FTPS (990) and MQTT (8883)
profile.bambulab.requiredPorts=990,8883
profile.bambulab.ports=990,8883,3000,3002,6000
profile.bambulab.port.990.service=FTPS (Secure FTP)
profile.bambulab.port.8883.service=MQTT (Secure)
profile.bambulab.port.3000.service=Bambu Service (Internal)
profile.bambulab.port.3002.service=Bambu Service (Internal)
profile.bambulab.port.6000.service=Bambu Camera Stream (Internal)

# Prusa configuration
profile.prusa.name=Prusa
# Minimal set for Prusa printers: HTTP (80) and MQTT (8883) for PrusaConnect/Link
profile.prusa.requiredPorts=80,8883
profile.prusa.ports=80,443,8000,8883
profile.prusa.port.80.service=PrusaLink (HTTP)
profile.prusa.port.80.pattern=.*Prusa(Link|Connect).*
profile.prusa.port.443.service=PrusaLink (HTTPS)
profile.prusa.port.443.pattern=.*Prusa(Link|Connect).*
profile.prusa.port.8000.service=PrusaLink (Alt)
profile.prusa.port.8883.service=PrusaConnect (MQTT)

# Klipper configuration
profile.klipper.name=Klipper
# Minimal set: Moonraker API (7125)
profile.klipper.requiredPorts=7125
profile.klipper.ports=80,7125
profile.klipper.port.7125.service=Moonraker API
profile.klipper.port.7125.pattern=.*Moonraker.*
profile.klipper.port.80.service=Klipper (Web Interface)
profile.klipper.port.80.pattern=.*(Mainsail|Fluidd|Klipper).*

# OctoPrint configuration
profile.octoprint.name=OctoPrint
# Minimal set: OctoPrint default port (5000)
profile.octoprint.requiredPorts=5000
profile.octoprint.ports=80,5000
profile.octoprint.port.5000.service=OctoPrint
profile.octoprint.port.5000.pattern=.*OctoPrint.*
profile.octoprint.port.80.service=OctoPrint (Web Interface)
profile.octoprint.port.80.pattern=.*OctoPrint.*
